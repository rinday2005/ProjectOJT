server:
  port: 8080

spring:
  main:
    allow-bean-definition-overriding: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/homecare-realm
  codec:
    max-in-memory-size: 10MB

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**, /api/v1/residents/**, /api/v1/admin/**, /api/v1/patients/**

        - id: caregiver-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/caregiver/**

        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/bookings/**, /api/v1/schedules/**, /api/v1/carelogs/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notifications/**, /api/v1/files/**

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    org.springframework.cloud.gateway: DEBUG